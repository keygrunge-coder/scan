<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Scan Paket</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
font-family:Arial,sans-serif;
margin:10px;
background:#f5f5f5;
}

h2{
text-align:center;
}

video{
width:100%;
max-height:350px;
background:black;
border-radius:10px;
}

button{
padding:10px;
margin:3px;
}

input{
padding:10px;
width:100%;
box-sizing:border-box;
margin-bottom:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.success{
color:green;
font-weight:bold;
}

.error{
color:red;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:6px;
font-size:12px;
}

th{
background:#eee;
}
</style>
</head>
<body>

<h2>SCAN PAKET</h2>

<div class="card">

<div>
J&T : <span id="jt">0</span> |
SPX : <span id="spx">0</span> |
Lazada : <span id="lzd">0</span> |
Lainnya : <span id="other">0</span>
</div>

<h3>Total : <span id="total">0</span></h3>

</div>

<video id="video"></video>

<div style="margin-top:10px">

<button onclick="startScanner()">Mulai Scan</button>

<button onclick="toggleTorch()">
Flash
</button>

<button onclick="exportExcel()">
Export Excel
</button>

<button onclick="hapusSemua()">
Hapus Semua
</button>

</div>

<p id="status"></p>

<input
type="text"
id="search"
placeholder="Cari Resi..."
onkeyup="render()">

<table>

<thead>
<tr>
<th>No</th>
<th>Kurir</th>
<th>Resi</th>
<th>Waktu</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<script>

let data=
JSON.parse(
localStorage.getItem("scanData")
)||[];

let codeReader;
let selectedDeviceId;
let currentTrack;

function saveData(){
localStorage.setItem(
"scanData",
JSON.stringify(data)
);
}

function beep(){

const ctx=
new (
window.AudioContext||
window.webkitAudioContext
)();

const osc=
ctx.createOscillator();

osc.frequency.value=1000;

osc.connect(ctx.destination);

osc.start();

osc.stop(
ctx.currentTime+0.15
);

}

function vibrate(){
navigator.vibrate?.(150);
}

function getCourier(resi){

const r=
resi.toUpperCase();

if(
r.startsWith("JT")||
r.startsWith("JP")||
r.startsWith("JX")||
r.startsWith("JD")||
r.startsWith("JNT")
){
return "J&T";
}

if(
r.startsWith("SPX")||
r.startsWith("SPXID")
){
return "SPX";
}

if(
r.startsWith("LEX")||
r.startsWith("LZD")||
r.startsWith("LAZ")
){
return "Lazada";
}

return "Lainnya";
}

function addResi(resi){

resi=resi.trim();

if(
data.some(
x=>x.resi===resi
)
){

document.getElementById(
"status"
).innerHTML=
"<span class='error'>DUPLIKAT</span>";

return;
}

beep();
vibrate();

const item={
resi,
kurir:getCourier(resi),
waktu:new Date()
.toLocaleString("id-ID")
};

data.unshift(item);

saveData();
render();

document.getElementById(
"status"
).innerHTML=
"<span class='success'>SCAN BERHASIL</span>";

}

function render(){

const keyword=
document.getElementById(
"search"
).value.toLowerCase();

const tbody=
document.getElementById(
"tbody"
);

tbody.innerHTML="";

let jt=0;
let spx=0;
let lzd=0;
let other=0;

data.forEach((item,index)=>{

if(
!item.resi
.toLowerCase()
.includes(keyword)
){
return;
}

if(item.kurir==="J&T") jt++;
else if(item.kurir==="SPX") spx++;
else if(item.kurir==="Lazada") lzd++;
else other++;

const tr=
document.createElement("tr");

tr.innerHTML=`
<td>${index+1}</td>
<td>${item.kurir}</td>
<td>${item.resi}</td>
<td>${item.waktu}</td>
<td>
<button onclick="hapus(${index})">
X
</button>
</td>
`;

tbody.appendChild(tr);

});

document.getElementById("jt").textContent=jt;
document.getElementById("spx").textContent=spx;
document.getElementById("lzd").textContent=lzd;
document.getElementById("other").textContent=other;

document.getElementById(
"total"
).textContent=data.length;

}

function hapus(i){

if(
confirm("Hapus data?")
){

data.splice(i,1);

saveData();

render();

}

}

function hapusSemua(){

if(
confirm("Hapus semua?")
){

data=[];

saveData();

render();

}

}

async function startScanner(){

codeReader=
new ZXing.BrowserMultiFormatReader();

const devices=
await codeReader.listVideoInputDevices();

selectedDeviceId=
devices[0].deviceId;

codeReader.decodeFromVideoDevice(
selectedDeviceId,
"video",
(result,error)=>{

if(result){

addResi(result.text);

}

}
);

}

async function toggleTorch(){

try{

const video=
document.querySelector("video");

const track=
video.srcObject
.getVideoTracks()[0];

const capabilities=
track.getCapabilities();

if(
capabilities.torch
){

window.torchOn=
!window.torchOn;

await track.applyConstraints({
advanced:[
{
torch:
window.torchOn
}
]
});

}

}catch(e){}

}

function exportExcel(){

const jt=
data.filter(
x=>x.kurir==="J&T"
);

const spx=
data.filter(
x=>x.kurir==="SPX"
);

const laz=
data.filter(
x=>x.kurir==="Lazada"
);

const other=
data.filter(
x=>x.kurir==="Lainnya"
);

const wb=
XLSX.utils.book_new();

function addSheet(
name,
rows
){

const sheet=
XLSX.utils.json_to_sheet(
rows.map(
(x,i)=>({
No:i+1,
Resi:x.resi,
Waktu:x.waktu
})
)
);

XLSX.utils.book_append_sheet(
wb,
sheet,
name
);

}

addSheet("J&T",jt);
addSheet("SPX",spx);
addSheet("Lazada",laz);
addSheet("Lainnya",other);

XLSX.writeFile(
wb,
"hasil_scan.xlsx"
);

}

render();

</script>

</body>
</html>
