<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scan Paket Retur V2</title>
<script src="https://unpkg.com/@zxing/browser@latest"></script>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:10px}
.card{background:#fff;padding:10px;border-radius:10px;margin-bottom:10px}
button{padding:10px;margin:4px}
.kirim{background:#4caf50;color:#fff}
.retur{background:#f44336;color:#fff}
video{width:100%;max-height:320px;background:#000;border-radius:8px}
.item{background:#fff;padding:8px;border-radius:8px;margin:5px 0}
.returRow{border-left:6px solid red}
.kirimRow{border-left:6px solid green}
</style>
</head>
<body>
<div class="card">
<h2>Scan Paket Retur V2</h2>
<button class="kirim" onclick="setMode('Terkirim')">Mode Kirim</button>
<button class="retur" onclick="setMode('Retur')">Mode Retur</button>
<div>Mode: <b id="modeText">Terkirim</b></div>
<div>Total Scan: <span id="total">0</span></div>
</div>

<video id="video" autoplay muted playsinline></video><br>
<button onclick="startScan()">Mulai Scan</button>

<div id="list"></div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyBSJcYGxG-22xqg62q1Q1U-g3_m8DjYVGFqyljLawfkGWZocQwSJvQwSTEJinHk8_xYA/exec";
let mode="Terkirim";
let data=JSON.parse(localStorage.getItem("scanData")||"[]");

function setMode(m){
 mode=m;
 document.getElementById("modeText").textContent=m;
}

function getCourier(r){
 r=r.toUpperCase();
 if(r.startsWith("SPX")) return "SPX";
 if(["JT","JP","JD","JX","JZ"].some(x=>r.startsWith(x))) return "J&T";
 return "Lainnya";
}

function valid(r){
 r=r.toUpperCase();
 return r.startsWith("SPX")||["JT","JP","JD","JX","JZ"].some(x=>r.startsWith(x));
}

function beep(){
 try{
 let c=new (window.AudioContext||window.webkitAudioContext)();
 let o=c.createOscillator();
 o.connect(c.destination); o.start(); o.stop(c.currentTime+0.1);
 }catch(e){}
}

function saveRow(resi){
 if(!valid(resi)) return;

 let ket="";
 if(mode==="Retur"){
   ket=prompt("Alasan retur?","Tidak diambil")||"";
 }

 let row={
  resi:resi,
  kurir:getCourier(resi),
  status:mode,
  keterangan:ket,
  waktu:new Date().toLocaleString("id-ID")
 };

 data.unshift(row);
 localStorage.setItem("scanData",JSON.stringify(data));
 render();

 fetch(SCRIPT_URL,{
   method:"POST",
   body:JSON.stringify(row)
 }).catch(()=>{});

 beep();
 navigator.vibrate && navigator.vibrate(100);
}

function render(){
 document.getElementById("total").textContent=data.length;
 let h="";
 data.forEach(x=>{
   h+=`<div class="item ${x.status==='Retur'?'returRow':'kirimRow'}">
   <b>${x.resi}</b><br>
   ${x.kurir} | ${x.status}<br>
   ${x.keterangan||''}<br>
   ${x.waktu}
   </div>`;
 });
 document.getElementById("list").innerHTML=h;
}
render();

async function startScan(){
 const reader=new ZXingBrowser.BrowserMultiFormatReader();
 reader.decodeFromConstraints(
 {video:{facingMode:{ideal:"environment"}}},
 "video",
 (result)=>{
   if(result) saveRow(result.getText());
 });
}
</script>
</body>
</html>
