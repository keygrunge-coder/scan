<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Resi</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    font-family:Arial,sans-serif;
    padding:15px;
    background:#f5f5f5;
}
h2{
    text-align:center;
}
#reader{
    width:100%;
    max-width:500px;
    margin:auto;
}
button{
    padding:10px;
    margin:5px;
    cursor:pointer;
}
table{
    width:100%;
    border-collapse:collapse;
    background:white;
}
th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:left;
}
th{
    background:#eee;
}
.duplicate{
    color:red;
    font-weight:bold;
}
.success{
    color:green;
    font-weight:bold;
}
</style>
</head>
<body>

<h2>Scanner Resi</h2>

<p>Total Resi: <span id="total">0</span></p>

<div id="reader"></div>

<div>
<button onclick="exportCSV()">Export CSV</button>
<button onclick="hapusSemua()">Hapus Semua</button>
</div>

<p id="status"></p>

<table>
<thead>
<tr>
<th>No</th>
<th>Resi</th>
<th>Waktu</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

let data = JSON.parse(localStorage.getItem("resiData")) || [];

function simpan(){
    localStorage.setItem("resiData", JSON.stringify(data));
}

function render(){

    document.getElementById("tbody").innerHTML="";

    data.forEach((item,index)=>{

        let tr=document.createElement("tr");

        tr.innerHTML=`
        <td>${index+1}</td>
        <td>${item.resi}</td>
        <td>${item.waktu}</td>
        <td>
            <button onclick="lacak('${item.resi}')">Lacak</button>
            <button onclick="hapus(${index})">Hapus</button>
        </td>
        `;

        document.getElementById("tbody").appendChild(tr);

    });

    document.getElementById("total").textContent=data.length;
}

function waktuSekarang(){

    let d=new Date();

    return d.toLocaleString('id-ID');
}

function tambahResi(resi){

    resi=resi.trim();

    if(data.some(x=>x.resi===resi)){

        document.getElementById("status").innerHTML=
        "<span class='duplicate'>Resi sudah pernah discan</span>";

        return;
    }

    navigator.vibrate?.(150);

    data.unshift({
        resi:resi,
        waktu:waktuSekarang()
    });

    simpan();
    render();

    document.getElementById("status").innerHTML=
    "<span class='success'>Berhasil scan</span>";
}

function hapus(index){

    if(confirm("Hapus data ini?")){

        data.splice(index,1);

        simpan();
        render();
    }
}

function hapusSemua(){

    if(confirm("Hapus semua data?")){

        data=[];

        simpan();
        render();
    }
}

function exportCSV(){

    let csv="No,Resi,Waktu Scan\n";

    data.forEach((item,index)=>{

        csv+=`${index+1},"${item.resi}","${item.waktu}"\n`;

    });

    let blob=new Blob([csv],{
        type:"text/csv;charset=utf-8;"
    });

    let link=document.createElement("a");

    link.href=URL.createObjectURL(blob);

    link.download="hasil_scan_resi.csv";

    link.click();
}

function lacak(resi){

    window.open(
        "https://t.17track.net/en#nums="+encodeURIComponent(resi),
        "_blank"
    );
}

render();

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras()
.then(devices => {

    if(devices && devices.length){

        html5QrCode.start(
            { facingMode: "environment" },
            {
                fps:10,
                qrbox:250
            },
            decodedText => {

                tambahResi(decodedText);

            }
        );
    }
})
.catch(err => {

    alert("Kamera tidak tersedia");
});

</script>

</body>
</html>
